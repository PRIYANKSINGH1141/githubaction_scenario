name: Complete GitHub Actions CI/CD Demo

on:
  push:
    branches:
      - main

env:
  APP_NAME: WorkflowApp
  NODE_VERSION: "24"

jobs:

  # ---------------- BUILD FRONTEND ----------------
  build_frontend:
    runs-on: ubuntu-latest

    env:
      APP_NAME: FrontendApp

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Workflow vs Job Variable
        run: |
          echo "Application = $APP_NAME"
          echo "Node Version = $NODE_VERSION"

      - name: Step Variable Example
        env:
          APP_NAME: StepFrontendApp
        run: |
          echo "Application = $APP_NAME"

      - name: Install Dependencies
        run: echo "npm install"

      - name: Build Frontend
        run: |
          mkdir build
          echo "Frontend Build Completed" > build/frontend.txt

      # Upload Artifact
      - name: Upload Frontend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build/


  # ---------------- BUILD BACKEND ----------------
  build_backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Backend
        run: |
          mkdir backend
          echo "Backend Build Completed" > backend/backend.txt

      # Upload Artifact
      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend/


  # ---------------- UNIT TEST ----------------
  unit_test:
    needs: build_frontend
    runs-on: ubuntu-latest

    steps:
      # Download Artifact
      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build

      - name: Show Artifact
        run: cat frontend.txt

      - name: Run Unit Test
        run: echo "Running Frontend Unit Tests"


  # ---------------- API TEST ----------------
  api_test:
    needs: build_backend
    runs-on: ubuntu-latest

    steps:
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Show Artifact
        run: cat backend.txt

      - name: Run API Test
        run: echo "Running Backend API Tests"


  # ---------------- SECURITY SCAN ----------------
  security_scan:
    needs:
      - unit_test
      - api_test

    runs-on: ubuntu-latest

    steps:
      - name: Security Scan
        run: echo "Running Security Scan"


  # ---------------- DEPLOY ----------------
  deploy:
    needs: security_scan

    runs-on: ubuntu-latest

    environment: Production

    steps:
      - name: Deploy Application
        run: echo "Deploying to Production"

      - name: Print Workflow Variable
        run: echo "Workflow Variable = $APP_NAME"

      - name: Print Environment Variable
        run: echo "Environment Name = Production"
