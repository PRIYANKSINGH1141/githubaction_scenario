name: Workflow Variable Demo

on:
  push:
    branches:
      - main

env:
  APP_NAME: MyApplication
  VERSION: 1.0

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Print Variables
        run: |
          echo "App = $APP_NAME"
          echo "Version = $VERSION"

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Print Variables
        run: |
          echo "App = $APP_NAME"
          echo "Version = $VERSION"
