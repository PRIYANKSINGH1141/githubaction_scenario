name: Variable Precedence Demo

on:
  push:
    branches:
      - main

env:
  ENVIRONMENT: Development

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: Testing

    steps:

      - name: Step 1
        run: echo $ENVIRONMENT

      - name: Step 2
        env:
          ENVIRONMENT: Production
        run: echo $ENVIRONMENT

      - name: Step 3
        run: echo $ENVIRONMENT
